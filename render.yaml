services:
  # 1. Backend Node.js Web Service
  - type: web
    name: swastik-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  # 2. Frontend React / Vite Static Site
  - type: web
    name: swastik-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: swastik-backend
          envVarKey: RENDER_EXTERNAL_URL
          # Note: The /api must be appended manually in the code, or configured later if this fails to resolve with /api.
          # For safety we just pass the root URL and the frontend handles the rest, or we just configure it cleanly.

